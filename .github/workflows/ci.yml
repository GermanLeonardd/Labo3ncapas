name: CI - Build & Test

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labo3
    steps:
      - name: code-checkout
        uses: actions/checkout@v4

      - name: JDK-configuration
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build + Tests
        run: chmod +x mvnw && ./mvnw clean verify -B

      - name: publish tests reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: labo3/target/surefire-reports/

  smoke-test-compose:
    needs: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labo3
    steps:
      - name: code-checkout
        uses: actions/checkout@v4

      - name: Create test .env
        run: |
          cat <<END > .env
          DATABASE_NAME=labo3_ci
          DATABASE_USERNAME=ci_user
          DATABASE_PASSWORD=ci_password
          END

      - name: docker-compose-up
        run: docker compose up --build -d

      - name: wait-response
        run: |
          for i in $(seq 1 20); do
            if curl -s http://localhost:8080/api/specimens/getAll -o /dev/null; then
              echo "The application responded correctly."
              exit 0
            fi
            echo "Waiting for the app to start... ($i/20)"
            sleep 3
          done
          echo "The app never responded on time"
          exit 1

      - name: show-logs
        if: failure()
        run: docker compose logs

      - name: shutdown
        if: always()
        run: docker compose down -v
